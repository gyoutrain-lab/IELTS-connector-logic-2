<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Logical Connector Engine</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #2c3e50; --accent: #3498db; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; max-width: 700px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); }
        .prompt-box { background: #e8f4f8; padding: 15px; border-left: 5px solid var(--accent); margin: 20px 0; font-weight: bold; }
        button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; }
        .connector-btn { background: #ecf0f1; color: #333; border: 1px solid #bdc3c7; margin: 3px; font-weight: normal; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; margin: 15px 0; box-sizing: border-box; }
        .feedback { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; }
        .band9 { background: #d4edda; color: #155724; }
        .band67 { background: #fff3cd; color: #856404; }
        .na { background: #f8d7da; color: #721c24; }
        .target-syntax { margin-top: 10px; font-style: italic; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Band 9 Logical Connector Engine</h2>
    <div class="prompt-box" id="prompt-text">Loading...</div>
    <button onclick="playAudio('prompt')">🔊 Listen to Prompt</button>
    
    <div id="connector-options" style="margin: 20px 0;"></div>
    
    <textarea id="user-input" placeholder="Weave the sentences into a Band 9 complex structure..."></textarea>
    
    <div>
        <button onclick="evaluateResponse()">Submit & Score</button>
        <button onclick="nextPrompt()">Next Prompt ➔</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
const database = [
    ["Automation replaces human labor. It raises ethical concerns.", "simultaneous", "While automation supplants the manual workforce; it concurrently precipitates profound moral dilemmas."],
    ["Hospitals adopt electronic records. Clinical errors decrease significantly.", "cause", "Whereby hospitals institutionalize electronic records; they thereby catalyze a significant decrease in clinical errors."],
    ["Preventative medicine is costly. It reduces long-term systemic expenditure.", "contrast", "Notwithstanding that preventative medicine incurs substantial initial costs; it effectively mitigates long-term systemic expenditure."],
    ["Telemedicine increases accessibility. It lacks the nuances of physical examinations.", "contrast", "Although telemedicine exponentially increases accessibility; it inevitably lacks the diagnostic nuances of physical examinations."],
    ["Nurses migrate for better wages. This creates a brain drain in home countries.", "cause", "Insofar as medical professionals migrate seeking superior remuneration; they invariably precipitate a brain drain in their native countries."],
    ["International certification is mandatory. It ensures global standards of care.", "cause", "By virtue of mandating international certification; regulatory bodies thereby ensure uniform global standards of care."],
    ["Conscious practice is difficult. It is the only path to mastery.", "contrast", "Notwithstanding the rigorous difficulty of conscious practice; it remains the exclusive trajectory toward professional mastery."],
    ["Repetition builds neural pathways. Professional fluency requires consistent drills.", "cause", "By virtue of repetition forging robust neural pathways; professional fluency inherently dictates the need for consistent clinical drills."],
    ["Prometric exams are rigorous. They mandate high levels of preparation.", "cause", "By virtue of their rigorous methodological design; Prometric examinations thereby mandate extraordinary levels of candidate preparation."],
    ["Clinical vignettes test reasoning. Standard reporting is a prerequisite.", "cause", "Insofar as clinical vignettes strictly evaluate diagnostic reasoning; mastery of standard reporting remains an absolute prerequisite."]
    // Note: You can expand this array up to 50 items.
];

const connectorTiers = {
    "cause": ["and", "so", "therefore", "consequently", "whereby"],
    "contrast": ["but", "although", "however", "nevertheless", "notwithstanding"],
    "simultaneous": ["and", "also", "meanwhile", "simultaneously", "concurrently"]
};

let currentIndex = 0;

function loadPrompt() {
    const item = database[currentIndex];
    document.getElementById('prompt-text').innerText = item[0];
    document.getElementById('user-input').value = '';
    document.getElementById('feedback').style.display = 'none';
    const optionsContainer = document.getElementById('connector-options');
    optionsContainer.innerHTML = '';
    connectorTiers[item[1]].forEach(word => {
        let btn = document.createElement('button');
        btn.className = 'connector-btn';
        btn.innerText = word;
        btn.onclick = () => document.getElementById('user-input').value += word + ' ';
        optionsContainer.appendChild(btn);
    });
}

function playAudio(type, text = "") {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(type === 'prompt' ? document.getElementById('prompt-text').innerText : text);
    window.speechSynthesis.speak(msg);
}

function evaluateResponse() {
    const item = database[currentIndex];
    const input = document.getElementById('user-input').value.trim();
    const fb = document.getElementById('feedback');
    const wordCount = input.split(/\s+/).length;
    
    let score = "NA", message = "Invalid: Your response must be a full sentence (min 10 words) including punctuation and a logical connector.", css = "na";

    if (wordCount >= 10 && (input.includes(';') || input.includes(','))) {
        if (input.toLowerCase().includes(connectorTiers[item[1]][4])) {
            score = "Band 9";
            message = "Excellent! You utilized the Band 9 connector and proper structural complexity.";
            css = "band9";
        } else {
            score = "Band 7";
            message = "Good sentence, but use the most advanced connector (Band 9) to reach the highest tier.";
            css = "band67";
        }
    }

    fb.className = `feedback ${css}`;
    fb.style.display = 'block';
    fb.innerHTML = `<strong>Result: ${score}</strong><br>${message}<div class="target-syntax"><strong>Target:</strong> ${item[2]}</div>`;
    playAudio('feedback', `Scored as ${score}. ${message}`);
}

function nextPrompt() { currentIndex = (currentIndex + 1) % database.length; loadPrompt(); }
window.onload = loadPrompt;
</script>
</body>
</html>
